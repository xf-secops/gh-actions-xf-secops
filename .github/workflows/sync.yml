---
name: sync

"on":
  workflow_dispatch:
    inputs:
      dispatch_action:
        required: true
        type: choice
        options: [sync]
      app_id:
        required: true
        type: string
      repo_full_name:
        required: true
        type: string
      event_payload:
        required: true
        type: string

concurrency:
  group: repo-sync-${{ github.repository }}-${{ github.event.inputs.repo_full_name }}
  cancel-in-progress: false

permissions: {}

jobs:
  prepare_sync:
    permissions:
      contents: read
    uses: >-
      shared-common/gh-actions-shared/.github/workflows/prepare-sync-core.yml@v0.0.23
    with:
      event-payload: ${{ inputs.event_payload }}
      event-context: ${{ toJson(github.event) }}
      event-name: ${{ github.event_name }}
      expected-event-action: ${{ inputs.dispatch_action }}
      target-org: ${{ github.repository_owner }}
      shared-repo: shared-common/gh-actions-shared
      shared-ref: v0.0.23
      bws-version: ${{ vars.BWS_VERSION }}
      bws-sha256: ${{ vars.BWS_SHA256 }}
    secrets:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      BWS_PROJECT_ID: ${{ secrets.BWS_PROJECT_ID }}

  gitlab_sync:
    needs: prepare_sync
    permissions:
      contents: read
    uses: >-
      shared-common/gh-actions-shared/.github/workflows/gitlab-sync-core.yml@v0.0.23
    with:
      validated-payload: ${{ needs.prepare_sync.outputs.validated-payload }}
      target-org: ${{ github.repository_owner }}
      shared-repo: shared-common/gh-actions-shared
      shared-ref: v0.0.23
      bws-version: ${{ vars.BWS_VERSION }}
      bws-sha256: ${{ vars.BWS_SHA256 }}
    secrets:
      BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      BWS_PROJECT_ID: ${{ secrets.BWS_PROJECT_ID }}
      GH_INSTALL_TOKEN: ${{ needs.prepare_sync.outputs.github-install-token }}
